version: 1
services:
  - type: web
    name: extension-manager
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask --app views.py run --host=0.0.0.0 --port=$PORT
    envVars:
      - key: FLASK_APP
        value: views.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: extension-db
          property: connectionString
  - type: database
    name: extension-db
    runtime: postgresql
    plan: free
